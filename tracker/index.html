<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aquoz Referral Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0b2438;
      --navy-2: #0e2c44;
      --bg: #f5fbfd;
      --panel: #ffffff;
      --ink: #102433;
      --muted: #627789;
      --line: #dce9ef;
      --line-strong: #c5d8e2;
      --blue: #1880bd;
      --blue-deep: #115e8b;
      --aqua: #46c2d6;
      --soft: #eef9fc;
      --green: #1f9d63;
      --orange: #f07a3a;
      --red: #c7493d;
      --shadow: 0 18px 48px rgba(10,35,52,.12);
      --shadow-sm: 0 8px 22px rgba(12,40,60,.08);
      --radius: 14px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, #f6fcfd 0%, #eef7fa 42%, #f7fbfd 100%);
      color: var(--ink);
      font-family: "Plus Jakarta Sans", system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }

    .gate {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(120% 90% at 85% 10%, rgba(70,194,214,.20), transparent 55%),
        linear-gradient(108deg, rgba(7,26,42,.95), rgba(8,30,48,.84));
    }

    .gate-box {
      width: min(420px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 26px;
    }

    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .brand img { width: 116px; }
    .brand span { font-weight: 800; color: var(--blue-deep); }

    .gate-box h1, .toolbar h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .gate-box p { margin: 8px 0 22px; color: var(--muted); line-height: 1.55; }
    .field { display: grid; gap: 7px; margin-bottom: 14px; }
    .field label { color: var(--muted); font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; }
    input, select, textarea {
      width: 100%;
      border: 1.5px solid #d3e1e9;
      border-radius: var(--radius-sm);
      min-height: 42px;
      padding: 10px 12px;
      color: var(--ink);
      background: #fff;
      outline: none;
    }
    textarea { min-height: 86px; resize: vertical; }
    input:focus, select:focus, textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 4px rgba(24,128,189,.13); }

    .btn {
      min-height: 40px;
      border: 1px solid transparent;
      border-radius: 999px;
      background: linear-gradient(180deg, #2a93cf, var(--blue) 60%, var(--blue-deep));
      color: #fff;
      font-weight: 800;
      padding: 0 13px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 12px 24px rgba(24,128,189,.24), inset 0 1px 0 rgba(255,255,255,.25);
      transition: transform .18s ease, box-shadow .18s ease, filter .18s ease;
      text-decoration: none;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 16px 30px rgba(24,128,189,.30), inset 0 1px 0 rgba(255,255,255,.25); }
    .btn.primary { background: linear-gradient(180deg, #2a93cf, var(--blue) 60%, var(--blue-deep)); color: #fff; }
    .btn.green { background: linear-gradient(180deg, #27b873, var(--green)); color: #fff; box-shadow: 0 12px 22px rgba(31,157,99,.22); }
    .btn.orange { background: linear-gradient(180deg, #f08b4f, #df7434); color: #fff; box-shadow: 0 12px 22px rgba(240,122,58,.20); }
    .btn.light { background: #fff; color: var(--navy); border-color: var(--line-strong); box-shadow: none; }
    .btn.icon { width: 40px; padding: 0; }
    .btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }

    .app { display: none; min-height: 100vh; }
    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255,255,255,.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 8px 30px rgba(10,35,52,.06);
    }
    .toolbar {
      max-width: 1540px;
      margin: 0 auto;
      padding: 16px 22px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 16px;
    }
    .toolbar .brand { margin: 0; }
    .toolbar .brand img { width: 98px; }
    .tools {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }
    .search { max-width: 320px; }

    main { max-width: 1500px; margin: 0 auto; padding: 18px 22px 26px; }
    .status-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    .metric {
      background: linear-gradient(180deg, #fff, var(--soft));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 11px 14px;
    }
    .metric span { display: block; color: var(--muted); font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; }
    .metric b { display: block; margin-top: 4px; color: var(--navy); font-size: 22px; line-height: 1; }

    .setup {
      display: none;
      margin-bottom: 18px;
      padding: 13px 14px;
      border: 1px solid #f5c36e;
      border-radius: var(--radius);
      background: #fff8eb;
      color: #815016;
      line-height: 1.55;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, minmax(320px, 1fr));
      gap: 12px;
      align-items: start;
      overflow-x: auto;
      padding-bottom: 10px;
    }
    .column {
      min-height: 620px;
      background: rgba(255,255,255,.66);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
      box-shadow: var(--shadow-sm);
    }
    .col-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 3px 4px 9px;
    }
    .col-head h2 { margin: 0; color: var(--navy); font-size: 14px; }
    .col-head p { margin: 2px 0 0; color: var(--muted); font-size: 11px; }
    .count {
      min-width: 28px;
      height: 24px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #fff;
      border: 1px solid var(--line);
      font-size: 12px;
      font-weight: 800;
    }
    .stack { display: grid; gap: 8px; min-height: 56px; }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      box-shadow: 0 8px 20px rgba(16,36,51,.055);
      padding: 11px;
      height: 224px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 8px;
      overflow: hidden;
    }
    .card-top { display: grid; grid-template-columns: minmax(0, 1fr) auto; align-items: start; gap: 10px; }
    .card h3 { margin: 0; color: var(--navy); font-size: 15px; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pill {
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 800;
      background: var(--soft);
      color: var(--blue-deep);
      white-space: nowrap;
    }
    .source-line {
      margin-top: 4px;
      color: var(--muted);
      font-size: 11.5px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      color: var(--muted);
      font-size: 10.5px;
    }
    .meta-item {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfdfe;
      padding: 7px 8px;
    }
    .meta-item span {
      display: block;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .04em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .meta-item b {
      display: block;
      margin-top: 3px;
      color: var(--navy);
      font-size: 12px;
      line-height: 1.1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .refline {
      min-height: 44px;
      padding: 8px;
      border-radius: 8px;
      background: var(--soft);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
      overflow: hidden;
    }
    .refline strong { color: var(--ink); }
    .referral-pair {
      min-height: 44px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fbfd;
      display: grid;
      gap: 4px;
      overflow: hidden;
    }
    .referral-line {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      font-size: 12px;
      line-height: 1.2;
    }
    .referral-line b {
      min-width: 0;
      color: var(--navy);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .referral-line .arrow {
      color: var(--blue);
      font-weight: 900;
      flex: none;
    }
    .referral-note {
      min-width: 0;
      color: var(--muted);
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .mini-links {
      display: flex;
      gap: 10px;
      min-width: 0;
      font-size: 11px;
      font-weight: 800;
    }
    .mini-links a {
      color: var(--blue-deep);
      text-decoration: none;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .mini-links a:hover { text-decoration: underline; }
    .card-actions { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 6px; }
    .card-actions .btn {
      min-height: 30px;
      padding: 0 8px;
      font-size: 11px;
      box-shadow: none;
      white-space: nowrap;
    }
    .card-actions .wide { grid-column: 1 / -1; }
    .card-actions .span-2 { grid-column: span 2; }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    .empty {
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      padding: 18px;
      color: var(--muted);
      text-align: center;
      background: rgba(255,255,255,.55);
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 40;
      max-width: 420px;
      display: none;
      padding: 12px 14px;
      border-radius: var(--radius);
      background: #102433;
      color: #fff;
      box-shadow: var(--shadow);
      line-height: 1.45;
    }
    .toast.error { background: #8f2f28; }

    dialog {
      width: min(560px, calc(100% - 28px));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 0;
      box-shadow: var(--shadow);
    }
    dialog::backdrop { background: rgba(16,36,51,.42); backdrop-filter: blur(3px); }
    .modal-head, .modal-body, .modal-foot { padding: 16px; }
    .modal-head { border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .modal-head h2 { margin: 0; font-size: 18px; }
    .modal-body { display: grid; gap: 14px; }
    .modal-foot { border-top: 1px solid var(--line); display: flex; justify-content: flex-end; gap: 10px; }
    .target-name { color: var(--muted); margin-top: 4px; }
    .error-text { min-height: 18px; color: var(--red); font-size: 12px; margin-top: 10px; }

    @media (max-width: 1040px) {
      .toolbar { grid-template-columns: 1fr; }
      .tools { justify-content: start; }
      .status-row { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 640px) {
      main, .toolbar { padding-left: 14px; padding-right: 14px; }
      .status-row { grid-template-columns: 1fr; }
      .board { grid-template-columns: repeat(3, 82vw); }
    }
  </style>
</head>
<body>
  <section class="gate" id="gate">
    <form class="gate-box" id="login-form">
      <div class="brand">
        <img src="/assets/aquoz-logo.png" alt="Aquoz">
        <span>Referral Tracker</span>
      </div>
      <h1>Referral and review tracker</h1>
      <p>Closed-won opportunities from GHL, referral links, and post-install review/referral requests.</p>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required>
      </div>
      <button class="btn primary" type="submit" id="login-btn">Unlock</button>
      <div class="error-text" id="login-error"></div>
    </form>
  </section>

  <section class="app" id="app">
    <header>
      <div class="toolbar">
        <div class="brand">
          <img src="/assets/aquoz-logo.png" alt="Aquoz">
          <div>
            <h1>Referral Tracker</h1>
            <span id="updated">Waiting for GHL</span>
          </div>
        </div>
        <input class="search" id="search" type="search" placeholder="Search won opportunities">
        <div class="tools">
          <button class="btn" id="refresh-btn" type="button">Refresh</button>
          <button class="btn" id="logout-btn" type="button">Lock</button>
        </div>
      </div>
    </header>

    <main>
      <div class="setup" id="setup"></div>
      <section class="status-row" id="metrics"></section>
      <section class="board" id="board"></section>
    </main>
  </section>

  <dialog id="link-dialog">
    <form method="dialog">
      <div class="modal-head">
        <div>
          <h2>Link referrer</h2>
          <div class="target-name" id="link-target"></div>
        </div>
        <button class="btn icon" value="cancel" aria-label="Close" type="submit">X</button>
      </div>
    </form>
    <div class="modal-body">
      <div class="field">
        <label for="referrer-select">Who referred this customer?</label>
        <input id="referrer-search" type="search" placeholder="Search by name or source" autocomplete="off">
        <select id="referrer-select"></select>
      </div>
      <div class="field">
        <label for="referral-note">Note</label>
        <textarea id="referral-note" placeholder="Optional referral context"></textarea>
      </div>
      <div class="error-text" id="link-error"></div>
    </div>
    <div class="modal-foot">
      <button class="btn" id="cancel-link" type="button">Cancel</button>
      <button class="btn primary" id="save-link" type="button">Save link</button>
    </div>
  </dialog>

  <div class="toast" id="toast"></div>

  <script>
    const API = '/api/tracker';
    const state = {
      token: sessionStorage.getItem('aquoz_tracker_token') || '',
      opportunities: [],
      columns: [],
      selectedOpportunityId: '',
      referrerQuery: '',
      query: '',
    };

    const money = (value) => new Intl.NumberFormat('en-AU', {
      style: 'currency',
      currency: 'AUD',
      maximumFractionDigits: 0,
    }).format(value || 0);

    const esc = (value) => String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');

    function showToast(message, type) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.toggle('error', type === 'error');
      toast.style.display = 'block';
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => { toast.style.display = 'none'; }, 4200);
    }

    async function api(path, options = {}) {
      const resp = await fetch(API + path, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${state.token}`,
          ...(options.headers || {}),
        },
      });
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) {
        const err = new Error(data.error || `HTTP ${resp.status}`);
        err.data = data;
        throw err;
      }
      return data;
    }

    function enterApp() {
      document.getElementById('gate').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadTracker();
    }

    function lock() {
      state.token = '';
      sessionStorage.removeItem('aquoz_tracker_token');
      document.getElementById('gate').style.display = 'grid';
      document.getElementById('app').style.display = 'none';
    }

    async function login(event) {
      event.preventDefault();
      const button = document.getElementById('login-btn');
      const error = document.getElementById('login-error');
      button.disabled = true;
      error.textContent = '';
      try {
        const resp = await fetch(API + '/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: document.getElementById('password').value }),
        });
        const data = await resp.json();
        if (!resp.ok || !data.token) throw new Error(data.error || 'Could not unlock tracker.');
        state.token = data.token;
        sessionStorage.setItem('aquoz_tracker_token', state.token);
        enterApp();
      } catch (err) {
        error.textContent = err.message;
      } finally {
        button.disabled = false;
      }
    }

    function daysSince(iso) {
      if (!iso) return '';
      const diff = Date.now() - new Date(iso).getTime();
      if (!Number.isFinite(diff)) return '';
      const days = Math.max(0, Math.floor(diff / 86400000));
      return `${days} day${days === 1 ? '' : 's'}`;
    }

    function filteredOpportunities() {
      const q = state.query.trim().toLowerCase();
      if (!q) return state.opportunities;
      return state.opportunities.filter((opp) => {
        return [opp.name, opp.email, opp.phone, opp.source, opp.referredByName, opp.referrer && opp.referrer.name, opp.stageName]
          .join(' ')
          .toLowerCase()
          .includes(q);
      });
    }

    function renderMetrics(list) {
      const totalValue = list.reduce((sum, opp) => sum + (opp.value || 0), 0);
      const linked = list.filter((opp) => opp.referredById).length;
      const made = list.reduce((sum, opp) => sum + (opp.referralsMade ? opp.referralsMade.length : 0), 0);
      document.getElementById('metrics').innerHTML = [
        ['Won opportunities', list.length],
        ['Won value', money(totalValue)],
        ['Linked referrals', linked],
        ['Referrals made', made],
      ].slice(0, 4).map(([label, value]) => `
        <div class="metric"><span>${esc(label)}</span><b>${esc(value)}</b></div>
      `).join('');
    }

    function renderSetup(setup) {
      const box = document.getElementById('setup');
      const missing = (setup && setup.missingFields || []).filter((field) => field.requiredForLink);
      const hasReviewEmailConfig = setup && (setup.hasReviewUrl || setup.hasReviewEmailTemplate);
      if (!setup || (!missing.length && setup.hasGhlApiKey && setup.hasLocationId && hasReviewEmailConfig)) {
        box.style.display = 'none';
        box.innerHTML = '';
        return;
      }
      const parts = [];
      if (!setup.hasGhlApiKey) parts.push('GHL API key env var is missing.');
      if (!setup.hasLocationId) parts.push('GHL location ID env var is missing.');
      if (missing.length) parts.push('Referral custom field ID is missing, so saving referral links will fail until it is added.');
      if (!hasReviewEmailConfig) parts.push('Review email needs AQUOZ_REVIEW_URL or AQUOZ_REVIEW_EMAIL_TEMPLATE_ID.');
      box.innerHTML = `<strong>Setup attention:</strong> ${esc(parts.join(' '))}`;
      box.style.display = 'block';
    }

    function ghlButton(url, label, className = 'btn light') {
      return url
        ? `<a class="${esc(className)}" href="${esc(url)}" target="_blank" rel="noopener noreferrer">${esc(label)}</a>`
        : '';
    }

    function ghlTextLink(url, label) {
      return url
        ? `<a href="${esc(url)}" target="_blank" rel="noopener noreferrer">${esc(label)}</a>`
        : '';
    }

    function referralPairHtml(opp) {
      const referrer = opp.referrer || {
        name: opp.referredByName || opp.referredById,
        contactId: opp.referredByContactId,
        ghlContactUrl: opp.referredByGhlContactUrl,
      };
      const referrerName = referrer.name || opp.referredByName || 'the referrer';
      return `
        <div class="referral-pair">
          <div class="referral-line">
            <b>${esc(referrerName)}</b>
            <span class="arrow">-&gt;</span>
            <b>${esc(opp.name)}</b>
          </div>
          <div class="referral-note">${esc(referrerName)} referred ${esc(opp.name)} | ${money(opp.value)} won</div>
          <div class="mini-links">
            ${ghlTextLink(referrer.ghlContactUrl, 'View referrer in GHL')}
            ${ghlTextLink(opp.ghlContactUrl, 'View customer in GHL')}
          </div>
        </div>
      `;
    }

    function cardHtml(opp) {
      const linked = opp.referredByName || opp.referredById;
      const madeCount = opp.referralsMade ? opp.referralsMade.length : 0;
      const source = opp.source || 'Unknown';
      const stage = opp.stageName || 'Closed Won';
      const viewCustomerButton = ghlButton(opp.ghlContactUrl, 'View in GHL');
      return `
        <article class="card" data-id="${esc(opp.id)}">
          <div class="card-top">
            <div>
              <h3>${esc(opp.name)}</h3>
              <div class="source-line">${esc(source)}</div>
            </div>
            <span class="pill">${money(opp.value)}</span>
          </div>
          <div class="meta">
            <div class="meta-item"><span>Status</span><b>Won</b></div>
            <div class="meta-item"><span>Stage</span><b>${esc(stage)}</b></div>
            <div class="meta-item"><span>Age</span><b>${esc(daysSince(opp.wonAt) || 'Unknown')}</b></div>
          </div>
          ${linked ? referralPairHtml(opp) : `
            <div class="refline">
              No referrer linked yet.
              ${madeCount ? `<br><strong>${madeCount}</strong> referral${madeCount === 1 ? '' : 's'} attributed to this customer.` : ''}
            </div>
          `}
          <div class="card-actions">
            <button class="btn light" type="button" data-action="link" data-id="${esc(opp.id)}">${linked ? 'Change' : 'Link'}</button>
            ${linked ? `<button class="btn orange" type="button" data-action="unlink" data-id="${esc(opp.id)}">Unlink</button>` : ''}
            ${linked ? '' : viewCustomerButton}
            <button class="btn green" type="button" data-action="ask" data-id="${esc(opp.id)}">Review</button>
          </div>
        </article>
      `;
    }

    function renderBoard() {
      const list = filteredOpportunities();
      renderMetrics(list);
      const board = document.getElementById('board');
      board.innerHTML = state.columns.map((column) => {
        const cards = list.filter((opp) => opp.bucket === column.key);
        return `
          <section class="column">
            <div class="col-head">
              <div>
                <h2>${esc(column.label)}</h2>
                <p>${esc(column.hint || '')}</p>
              </div>
              <span class="count">${cards.length}</span>
            </div>
            <div class="stack">
              ${cards.length ? cards.map(cardHtml).join('') : '<div class="empty">No cards</div>'}
            </div>
          </section>
        `;
      }).join('');
    }

    async function loadTracker() {
      const refresh = document.getElementById('refresh-btn');
      refresh.disabled = true;
      try {
        const data = await api('/opportunities');
        state.opportunities = data.opportunities || [];
        state.columns = data.columns || [];
        renderSetup(data.setup);
        document.getElementById('updated').textContent = data.generatedAt
          ? `Updated ${new Date(data.generatedAt).toLocaleString('en-AU')}`
          : 'Updated';
        renderBoard();
      } catch (err) {
        if (/unauthorized/i.test(err.message)) return lock();
        showToast(err.message, 'error');
      } finally {
        refresh.disabled = false;
      }
    }

    function referrerLabel(opp) {
      return `${opp.name} - ${opp.source || 'Unknown'}`;
    }

    function editableReferralNote(note) {
      const value = String(note || '').trim();
      return /updated by tracker/i.test(value) ? '' : value;
    }

    function referrerCandidates() {
      const q = state.referrerQuery.trim().toLowerCase();
      return state.opportunities
        .filter((opp) => opp.id !== state.selectedOpportunityId)
        .filter((opp) => {
          if (!q) return true;
          return [opp.name, opp.source, opp.email, opp.phone, opp.stageName]
            .join(' ')
            .toLowerCase()
            .includes(q);
        })
        .sort((a, b) => a.name.localeCompare(b.name));
    }

    function renderReferrerOptions() {
      const select = document.getElementById('referrer-select');
      const matches = referrerCandidates();
      select.disabled = !matches.length;
      select.innerHTML = matches.length
        ? matches.map((opp) => `<option value="${esc(opp.id)}">${esc(referrerLabel(opp))}</option>`).join('')
        : '<option value="">No matching won customers</option>';
    }

    function openLinkDialog(id) {
      const target = state.opportunities.find((opp) => opp.id === id);
      if (!target) return;
      state.selectedOpportunityId = id;
      state.referrerQuery = '';
      document.getElementById('link-target').textContent = target.name;
      document.getElementById('referral-note').value = editableReferralNote(target.referralNote);
      document.getElementById('link-error').textContent = '';
      document.getElementById('referrer-search').value = '';
      renderReferrerOptions();
      document.getElementById('link-dialog').showModal();
      document.getElementById('referrer-search').focus();
    }

    async function saveLink() {
      const button = document.getElementById('save-link');
      const error = document.getElementById('link-error');
      const referrerOpportunityId = document.getElementById('referrer-select').value;
      if (!referrerOpportunityId) {
        error.textContent = 'Search and select a referrer first.';
        return;
      }
      button.disabled = true;
      error.textContent = '';
      try {
        const data = await api('/referrals', {
          method: 'POST',
          body: JSON.stringify({
            opportunityId: state.selectedOpportunityId,
            referrerOpportunityId,
            note: document.getElementById('referral-note').value,
          }),
        });
        document.getElementById('link-dialog').close();
        const message = data.linked && data.linked.associationRelationReused
          ? 'Referral link saved in GHL. Additional opportunity was already linked.'
          : 'Referral link saved and additional opportunity linked in GHL.';
        showToast(data.linked && data.linked.noteWarning ? `${message} Note warning: ${data.linked.noteWarning}` : message);
        await loadTracker();
      } catch (err) {
        error.textContent = err.message;
      } finally {
        button.disabled = false;
      }
    }

    async function unlinkReferral(id) {
      const opportunity = state.opportunities.find((opp) => opp.id === id);
      if (!opportunity) return;
      const referrerName = opportunity.referredByName || 'the linked referrer';
      if (!confirm(`Unlink ${opportunity.name} from ${referrerName}? This will remove the linked additional opportunity relation in GHL.`)) return;
      try {
        const data = await api('/referrals', {
          method: 'DELETE',
          body: JSON.stringify({ opportunityId: id }),
        });
        const message = data.unlinked && data.unlinked.deletedRelation
          ? 'Referral unlinked and additional opportunity relation removed from GHL.'
          : 'Referral unlinked in GHL.';
        showToast(data.unlinked && data.unlinked.noteWarning ? `${message} Note warning: ${data.unlinked.noteWarning}` : message);
        await loadTracker();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function sendAsk(id) {
      const opportunity = state.opportunities.find((opp) => opp.id === id);
      if (!opportunity) return;
      const destination = opportunity.email ? ` to ${opportunity.email}` : '';
      if (!confirm(`Send review request email${destination} for ${opportunity.name}?`)) return;
      try {
        await api('/automation', {
          method: 'POST',
          body: JSON.stringify({ opportunityId: id, action: 'send_review_email' }),
        });
        showToast('Review request email sent.');
        await loadTracker();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    document.getElementById('login-form').addEventListener('submit', login);
    document.getElementById('refresh-btn').addEventListener('click', loadTracker);
    document.getElementById('logout-btn').addEventListener('click', lock);
    document.getElementById('cancel-link').addEventListener('click', () => document.getElementById('link-dialog').close());
    document.getElementById('save-link').addEventListener('click', saveLink);
    document.getElementById('referrer-search').addEventListener('input', (event) => {
      state.referrerQuery = event.target.value;
      renderReferrerOptions();
    });
    document.getElementById('search').addEventListener('input', (event) => {
      state.query = event.target.value;
      renderBoard();
    });
    document.getElementById('board').addEventListener('click', (event) => {
      const button = event.target.closest('button[data-action]');
      if (!button) return;
      if (button.dataset.action === 'link') openLinkDialog(button.dataset.id);
      if (button.dataset.action === 'unlink') unlinkReferral(button.dataset.id);
      if (button.dataset.action === 'ask') sendAsk(button.dataset.id);
    });

    if (state.token) enterApp();
  </script>
</body>
</html>
